# ES327 firmware — nRF52840 DK
# GPIO, RTT logging, C++ runtime, and TFLite Micro

# ---- GPIO ----------------------------------------------------------------
CONFIG_GPIO=y

# ---- RTT logging ---------------------------------------------------------
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_RTT_MODE_BLOCK=y
# Route printk to RTT so TFLM's MicroPrintf (which calls printk) is visible
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_PRINTK=y

# ---- UART (used by benchmark mode to stream data from host) --------------
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# ---- C++ support (required by TFLite Micro) ------------------------------
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FLOAT_PRINTF=y

# ---- TFLite Micro --------------------------------------------------------
# Enabled when the vendored tflm/ directory is present (see get_tflm.sh).
# CMakeLists.txt guards the TFLM subdirectory with an EXISTS check so the
# project still builds for blinky testing when tflm/ is absent.
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_MAIN_STACK_SIZE=8192
# Reduced so bilstm_small arena (172 KB) + USB stack fits in 256 KB RAM
CONFIG_HEAP_MEM_POOL_SIZE=48128

# ---- CMSIS-NN (speeds up INT8 conv on Cortex-M4 with DSP/SIMD) ----------
# nRF SDK v3.2.4 ships CMSIS-NN v18.0.0 which has all functions required by
# the vendored TFLM snapshot (arm_convolve_wrapper_s8, arm_softmax_s8_s16,
# arm_transpose_s8, etc.).  Enable all sub-modules so the Zephyr build
# system compiles and links the full CMSIS-NN static library.
CONFIG_CMSIS_NN=y
CONFIG_CMSIS_NN_ACTIVATION=y
CONFIG_CMSIS_NN_BASICMATH=y
CONFIG_CMSIS_NN_CONCATENATION=y
CONFIG_CMSIS_NN_CONVOLUTION=y
CONFIG_CMSIS_NN_FULLYCONNECTED=y
CONFIG_CMSIS_NN_NNSUPPORT=y
CONFIG_CMSIS_NN_POOLING=y
CONFIG_CMSIS_NN_RESHAPE=y
CONFIG_CMSIS_NN_SOFTMAX=y
CONFIG_CMSIS_NN_SVD=y
CONFIG_CMSIS_NN_LSTM=y
CONFIG_CMSIS_NN_PAD=y
CONFIG_CMSIS_NN_TRANSPOSE=y
