# Enable benchmark mode: wait for SYNC on UART0 for benchmark.py
# Use: west build -b nrf52840dk/nrf52840 -p . -- -DCONF_FILE="prj.conf;benchmark.conf"
CONFIG_ES327_BENCHMARK_MODE=y

# RTT tuning for benchmark: larger buffer, drop mode (avoids blocking), immediate mode
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
CONFIG_LOG_BACKEND_RTT_MODE_BLOCK=n
CONFIG_LOG_BACKEND_RTT_MODE_DROP=y
CONFIG_LOG_BACKEND_RTT_MESSAGE_SIZE=256
CONFIG_LOG_MODE_DEFERRED=n
CONFIG_LOG_MODE_IMMEDIATE=y
