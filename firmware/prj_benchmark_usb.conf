# Applied only when BENCHMARK=ON. Enables USB CDC ACM so benchmark protocol
# runs over the nRF52's USB (appears as a /dev/cu.usbmodem* or /dev/ttyACM* port).

CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y

# Use Zephyr's built-in CDC ACM serial init (enables USB at boot).
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_CDC_ACM_SERIAL_ENABLE_AT_BOOT=y
CONFIG_CDC_ACM_SERIAL_MANUFACTURER_STRING="ES327"
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="ES327 Benchmark"
CONFIG_CDC_ACM_SERIAL_VID=0x1915
CONFIG_CDC_ACM_SERIAL_PID=0x52E0

CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y

CONFIG_USBD_CDC_ACM_LOG_LEVEL_ERR=y
